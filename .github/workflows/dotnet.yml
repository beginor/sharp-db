# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Generate version
      id: version
      run: echo "tag=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
    - name: Publish
      run: |
        runtimes=(linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64 win-arm64)
        for rid in "${runtimes[@]}"; do
          dotnet publish src/SharpDb/SharpDb.csproj \
            --runtime "$rid" \
            --self-contained \
            --configuration Release \
            --property:PublishSingleFile=true \
            --property:IncludeNativeLibrariesForSelfExtract=true \
            --property:PublishTrimmed=true \
            --property:PublishReadyToRun=false \
            --property:DebugType=None \
            --output "./bin/$rid"
        done
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Release ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        files: |
          ./bin/linux-x64/sharp-db
          ./bin/linux-arm64/sharp-db
          ./bin/osx-x64/sharp-db
          ./bin/osx-arm64/sharp-db
          ./bin/win-x64/sharp-db.exe
          ./bin/win-arm64/sharp-db.exe
        # Note: native libraries (e.g. libe_sqlite3.dylib) are embedded
        # via IncludeNativeLibrariesForSelfExtract and extracted at runtime.
